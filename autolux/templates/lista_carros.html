<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Carros - AutoLux</title>

<style>
body{font-family: Arial; margin:0; background:#f4f4f4;}

header{
background:black;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
}

.container{padding:40px;}

.lista-carros{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.carro{
background:white;
padding:20px;
width:250px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
text-align:center;
}

.carro img{
width:100%;
}

button{
background:black;
color:white;
border:none;
padding:10px;
cursor:pointer;
margin-top:10px;
}

footer{
background:black;
color:white;
padding:30px;
text-align:center;
margin-top:40px;
}
</style>

</head>

<body>

<header>
<h1>AutoLux</h1>
<nav>
<a href="/">Home</a>
<a href="/carros/">Carros</a>
</nav>
</header>


<div class="container">

<h2 style="text-align:center;">Carros disponíveis</h2>

<div class="lista-carros">

{% for carro in carros %}
<div class="carro">

{% if carro.imagem %}
<img src="{{ carro.imagem.url }}">
{% else %}
<img src="https://picsum.photos/300/200">
{% endif %}

<h3>{{ carro.marca }} {{ carro.modelo }}</h3>

<p>Preço: {{ carro.preco }}$</p>
<p>Ano: {{ carro.ano }}</p>

<button onclick="detalhes(
'{{ carro.marca }} {{ carro.modelo }}',
'{{ carro.ano }}',
'{{ carro.combustivel }}'
)">Ver detalhes</button>

</div>

{% empty %}
<p>Sem carros disponiveis.</p>
{% endfor %}

</div>

</div>


<!-- MODAL -->
<div id="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); justify-content:center; align-items:center;">

<div style="background:white; padding:20px; border-radius:10px; width:300px; text-align:center;">
<h3 id="nome"></h3>
<p id="ano"></p>
<p id="combustivel"></p>

<button onclick="fechar()">Fechar</button>
</div>

</div>


<footer>
<h3>Contato</h3>
<p>+244 900 000 000</p>
<p>contato@autolux.com</p>
</footer>


<script>

function detalhes(nome, ano, combustivel){
document.getElementById("nome").innerText = nome
document.getElementById("ano").innerText = "Ano: " + ano
document.getElementById("combustivel").innerText = "Combustível: " + combustivel

document.getElementById("modal").style.display = "flex"
}

function fechar(){
document.getElementById("modal").style.display = "none"
}

</script>

</body>
</html>
